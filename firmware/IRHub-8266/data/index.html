<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRHub-8266</title>
    <link
      href="https://fonts.googleapis.com/css?family=Inter:300,400,600"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <!-- <div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:#1f2937;padding:28px;border-radius:12px;width:300px;display:flex;flex-direction:column;gap:12px;"> -->
    <div id="loginModal">
      <div class="login-box">
        <h3 style="margin: 0; text-align: center; font-size: 15px">Login</h3>
        <input id="loginUser" type="text" placeholder="Usuário" value="admin" />
        <input
          id="loginPass"
          type="password"
          placeholder="Senha"
          onkeydown="if (event.key === 'Enter') submitLogin();"
        />
        <span
          id="loginError"
          style="
            display: none;
            color: #ef4444;
            font-size: 12px;
            text-align: center;
          "
          >Usuário ou senha incorretos</span
        >
        <button class="btn-primary" onclick="submitLogin()">Entrar</button>
        <button onclick="hideLoginModal()" style="background: #374151">
          Cancelar
        </button>
      </div>
    </div>

    <div id="wsOverlay">
      <div class="ws-overlay-icon">⚡</div>
      <div class="ws-overlay-title">Reconectando...</div>
      <div class="ws-overlay-subtitle">Aguarde a conexão com o dispositivo</div>
    </div>

    <nav class="navbar">
      <button class="navbar-burger" onclick="drawerOpen()" aria-label="Menu">
        &#9776;
      </button>
      <span class="navbar-brand" id="name">IRHub-8266</span>
      <div class="navbar-links">
        <a href="/" data-link class="active">Home</a>
        <a href="/ir" data-link>IR</a>
        <a href="/system" data-link>System</a>
        <a href="/settings" data-link>Settings</a>
      </div>
      <span id="versionBadge" class="version-badge"></span>
      <span class="navbar-ws" id="wsStatus">
        <span class="status offline">⚡ Desconectado</span>
      </span>
      <button id="btnLogin" class="btn-navbar" onclick="handleLoginBtn()">
        Login
      </button>
      <button id="btnTheme" class="btn-navbar" onclick="toggleTheme()" title="Alternar tema">🌙</button>
    </nav>

    <div
      class="drawer-overlay"
      id="drawerOverlay"
      onclick="drawerClose()"
    ></div>
    <div class="drawer-title">IRHub-8266</div>
    <a href="/" data-link class="active">🏠 Home</a>
    <a href="/ir" data-link>📡 IR</a>
    <a href="/system" data-link>🤖 System</a>
    <a href="/settings" data-link>⚙️ Settings</a>

    <div id="app-content"></div>

    <script src="/app.js"></script>
  </body>
</html>
