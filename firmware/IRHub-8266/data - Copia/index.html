<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRHub-8266 — IR</title>
    <link
      href="https://fonts.googleapis.com/css?family=Inter:300,400,600"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <!-- OVERLAY RECONECTANDO -->
    <div id="wsOverlay">
      <div class="ws-overlay-icon">⚡</div>
      <div class="ws-overlay-title">Reconectando...</div>
      <div class="ws-overlay-subtitle">Aguarde a conexão com o dispositivo</div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
      <button class="navbar-burger" onclick="drawerOpen()" aria-label="Menu">
        &#9776;
      </button>
      <span class="navbar-brand" id="name">IRHub-8266</span>
      <div class="navbar-links">
        <a href="/" class="active">Home</a>
        <a href="/ir">IR</a>
        <a href="/system">System</a>
      </div>
      <span class="navbar-ws" id="wsStatus">
        <span class="status offline">⚡ Desconectado</span>
      </span>
    </nav>

    <!-- DRAWER (mobile) -->
    <div
      class="drawer-overlay"
      id="drawerOverlay"
      onclick="drawerClose()"
    ></div>
    <div class="drawer" id="drawer">
      <div class="drawer-title">IRHub-8266</div>
      <a href="/" class="active">🏠 Home</a>
      <a href="/ir">📡 IR</a>
      <a href="/system">🤖 System</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="control">
      <!-- IR CONTROLE -->
      <section class="card">
        <header>Controle IR</header>

        <div class="item">
          <label>Modelo:</label>
          <select id="remoteSelect"></select>
        </div>

        <div id="buttonsContainer" class="grid-buttons"></div>
      </section>
    </div>

    <!-- REMOTES MANAGER -->
    <section class="card remotes">
      <header>Controles Remotos</header>
      <div class="item">
        <div class="upload-row">
          <input type="file" id="remotesFile" accept=".json" />
          <button class="btn-send" onclick="importRemotes()">
            📤 Importar
          </button>
        </div>
        <div class="item">
          <button class="btn-primary" onclick="exportRemotes()">
            📥 Exportar remotes.json
          </button>
        </div>
      </div>
      <div
        id="remotesStatus"
        style="
          text-align: center;
          font-size: 11px;
          min-height: 16px;
          margin-top: 8px;
        "
      ></div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
