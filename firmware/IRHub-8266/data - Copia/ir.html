<div class="page-content">
  <div class="grid">
    <!-- IR EMISSOR -->
    <section class="card">
      <header>Emissor</header>

      <p class="section-label">Enviar Código IR</p>

      <div class="item">
        Protocolo:
        <select id="irProto">
          <option value="NEC">NEC</option>
          <option value="SAMSUNG">Samsung</option>
          <option value="SONY">Sony</option>
          <option value="RC5">RC5</option>
          <option value="RC6">RC6</option>
          <option value="NIKAI">Nikai</option>
          <option value="LG">LG</option>
          <option value="JVC">JVC</option>
          <option value="WHYNTER">Whynter</option>
        </select>
      </div>

      <div class="item">
        Código IR:
        <input
          id="irCode"
          type="text"
          placeholder="Hex (0x20DF10EF) ou Decimal (551489775)"
        />
      </div>

      <div class="item">
        Bits:
        <input
          id="irBits"
          type="number"
          value="32"
          min="1"
          max="64"
          placeholder="Ex: 32"
        />
      </div>

      <div class="item">
        <button class="btn-primary" onclick="sendIRManual()">
          📡 Enviar Código
        </button>
      </div>

      <hr />

      <p class="section-label">Modo de Teste</p>

      <div class="item">
        Status: <span id="irEmitter" class="value">--</span>
      </div>

      <div class="item">
        <button class="btn-ir-emitter" onclick="toggleIREmissor()">
          🔁 Alternar Modo Teste
        </button>
      </div>
    </section>

    <!-- IR RECEPTOR -->
    <section class="card">
      <header>Receptor</header>

      <p class="section-label">Status do Receptor</p>

      <div class="item">
        Sinal:
        <span id="irDot" class="dot yellow"></span>
        <span style="font-size: 11px; opacity: 0.7">(atividade)</span>
      </div>

      <div class="item">
        Protocolo ativo:
        <span id="irMode" class="value">--</span>
      </div>

      <hr />

      <p class="section-label">Configuração</p>
      <div class="item">
        <select id="irReceptorSelect">
          <option value="0">ALL</option>
          <option value="1">KNOWN</option>
          <option value="2">DISABLED</option>
          <option value="3">NEC</option>
          <option value="4">SONY</option>
          <option value="5">RC5</option>
          <option value="6">RC6</option>
          <option value="7">SAMSUNG</option>
          <option value="8">NIKAI</option>
          <option value="9">LG</option>
          <option value="10">JVC</option>
          <option value="11">WHYNTER</option>
        </select>
      </div>
      <div class="item">
        <button class="btn-ir-receptor btn-block" onclick="setIRReceptor()">
          ✅ Aplicar Protocolo
        </button>
      </div>
    </section>
  </div>
  <!-- /grid -->
</div>
<!-- /page-content -->

<div class="history">
  <!-- IR HISTORY -->
  <section class="card ir-history">
    <header>Últimos IR Recebidos</header>
    <ul id="irHistory"></ul>
    <div class="item">
      <button class="btn-clean btn-block" onclick="cleanHistory()">
        🗑 Limpar
      </button>
    </div>
  </section>
</div>
